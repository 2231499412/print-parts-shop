<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品图片上传</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .upload-area {
      border: 3px dashed #ddd;
      border-radius: 15px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }

    .upload-area:hover {
      border-color: #667eea;
      background: #f8f9ff;
    }

    .upload-area.dragover {
      border-color: #667eea;
      background: #eef0ff;
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .upload-text {
      color: #666;
      font-size: 16px;
    }

    .upload-hint {
      color: #999;
      font-size: 12px;
      margin-top: 10px;
    }

    .file-input {
      display: none;
    }

    .preview-section {
      margin-bottom: 20px;
    }

    .preview-title {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
    }

    .preview-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .preview-item {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid #eee;
    }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .preview-item .remove-btn {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 20px;
      height: 20px;
      background: rgba(255,0,0,0.8);
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      color: #333;
      margin-bottom: 5px;
      font-weight: 500;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #eee;
      border-radius: 10px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
    }

    .upload-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .upload-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .upload-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .upload-btn:active {
      transform: translateY(0);
    }

    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .status.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #eee;
      border-radius: 3px;
      margin-top: 10px;
      overflow: hidden;
      display: none;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      width: 0%;
      transition: width 0.3s ease;
    }

    .image-list {
      margin-top: 20px;
    }

    .image-list h3 {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
    }

    .image-item {
      display: flex;
      align-items: center;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #666;
    }

    .image-item .name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .image-item .size {
      margin-left: 10px;
      color: #999;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: #999;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📦 产品图片上传</h1>
    <p class="subtitle">上传产品图片到网站</p>

    <!-- Token输入 -->
    <div class="form-group">
      <label>访问密码（Token）</label>
      <input type="password" id="token" placeholder="输入提供的访问密码">
    </div>

    <!-- 上传区域 -->
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📁</div>
      <div class="upload-text">点击选择图片</div>
      <div class="upload-hint">支持 JPG、PNG、GIF 格式</div>
      <input type="file" class="file-input" id="fileInput" multiple accept="image/*">
    </div>

    <!-- 图片预览 -->
    <div class="preview-section" id="previewSection" style="display:none;">
      <div class="preview-title">已选择的图片：</div>
      <div class="preview-list" id="previewList"></div>
    </div>

    <!-- 产品信息 -->
    <div class="form-group">
      <label>产品名称（可选）</label>
      <input type="text" id="productName" placeholder="如：胶辊、墨刀片">
    </div>

    <div class="form-group">
      <label>产品品牌</label>
      <select id="productBrand">
        <option value="heidelberg">海德堡</option>
        <option value="komori">小森</option>
        <option value="roland">罗兰</option>
        <option value="other">其他</option>
      </select>
    </div>

    <!-- 上传按钮 -->
    <button class="upload-btn" id="uploadBtn" disabled>上传图片</button>

    <!-- 进度条 -->
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- 状态显示 -->
    <div class="status" id="status"></div>

    <!-- 已上传图片列表 -->
    <div class="image-list" id="imageList" style="display:none;">
      <h3>已上传的图片：</h3>
      <div id="uploadedImages"></div>
    </div>

    <div class="footer">
      图片将自动同步到网站
    </div>
  </div>

  <script>
    // 配置
    const CONFIG = {
      owner: 'YOUR_GITHUB_USERNAME',  // 替换为你的GitHub用户名
      repo: 'print-parts-images',     // 图片仓库名
      branch: 'main'
    };

    // 全局变量
    let selectedFiles = [];
    let token = '';

    // DOM元素
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const previewSection = document.getElementById('previewSection');
    const previewList = document.getElementById('previewList');
    const uploadBtn = document.getElementById('uploadBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const status = document.getElementById('status');
    const imageList = document.getElementById('imageList');
    const uploadedImages = document.getElementById('uploadedImages');
    const tokenInput = document.getElementById('token');
    const productName = document.getElementById('productName');
    const productBrand = document.getElementById('productBrand');

    // 事件监听
    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', handleDragOver);
    uploadArea.addEventListener('dragleave', handleDragLeave);
    uploadArea.addEventListener('drop', handleDrop);
    fileInput.addEventListener('change', handleFileSelect);
    uploadBtn.addEventListener('click', handleUpload);
    tokenInput.addEventListener('input', updateUploadButton);

    // 拖拽处理
    function handleDragOver(e) {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    }

    function handleDragLeave(e) {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
    }

    function handleDrop(e) {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
      addFiles(files);
    }

    // 文件选择
    function handleFileSelect(e) {
      const files = Array.from(e.target.files);
      addFiles(files);
    }

    // 添加文件
    function addFiles(files) {
      selectedFiles = [...selectedFiles, ...files];
      updatePreview();
      updateUploadButton();
    }

    // 更新预览
    function updatePreview() {
      if (selectedFiles.length === 0) {
        previewSection.style.display = 'none';
        return;
      }

      previewSection.style.display = 'block';
      previewList.innerHTML = '';

      selectedFiles.forEach((file, index) => {
        const item = document.createElement('div');
        item.className = 'preview-item';
        item.innerHTML = `
          <img src="${URL.createObjectURL(file)}" alt="${file.name}">
          <button class="remove-btn" onclick="removeFile(${index})">×</button>
        `;
        previewList.appendChild(item);
      });
    }

    // 移除文件
    function removeFile(index) {
      selectedFiles.splice(index, 1);
      updatePreview();
      updateUploadButton();
    }

    // 更新上传按钮状态
    function updateUploadButton() {
      token = tokenInput.value.trim();
      uploadBtn.disabled = selectedFiles.length === 0 || !token;
    }

    // 显示状态
    function showStatus(message, type) {
      status.textContent = message;
      status.className = `status ${type}`;
      status.style.display = 'block';
    }

    // 隐藏状态
    function hideStatus() {
      status.style.display = 'none';
    }

    // 更新进度
    function updateProgress(percent) {
      progressBar.style.display = 'block';
      progressFill.style.width = `${percent}%`;
    }

    // 上传文件
    async function handleUpload() {
      if (selectedFiles.length === 0 || !token) return;

      uploadBtn.disabled = true;
      uploadBtn.textContent = '上传中...';
      hideStatus();

      const totalFiles = selectedFiles.length;
      let successCount = 0;
      let errorCount = 0;

      for (let i = 0; i < selectedFiles.length; i++) {
        const file = selectedFiles[i];
        const progress = ((i + 1) / totalFiles) * 100;
        updateProgress(progress);

        try {
          await uploadFile(file);
          successCount++;
        } catch (error) {
          console.error('上传失败:', error);
          errorCount++;
        }
      }

      // 显示结果
      if (errorCount === 0) {
        showStatus(`✅ 成功上传 ${successCount} 张图片！`, 'success');
        selectedFiles = [];
        updatePreview();
        loadUploadedImages();
      } else {
        showStatus(`⚠️ 上传完成：${successCount} 成功，${errorCount} 失败`, 'error');
      }

      uploadBtn.disabled = false;
      uploadBtn.textContent = '上传图片';
      progressBar.style.display = 'none';
    }

    // 上传单个文件
    async function uploadFile(file) {
      const reader = new FileReader();

      return new Promise((resolve, reject) => {
        reader.onload = async () => {
          const base64 = reader.result.split(',')[1];
          const brand = productBrand.value;
          const name = productName.value || file.name.replace(/\.[^/.]+$/, '');
          const timestamp = Date.now();
          const fileName = `products/${brand}/${name}-${timestamp}.${file.name.split('.').pop()}`;

          try {
            const response = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${fileName}`, {
              method: 'PUT',
              headers: {
                'Authorization': `token ${token}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                message: `上传产品图片: ${name}`,
                content: base64,
                branch: CONFIG.branch
              })
            });

            if (response.ok) {
              resolve();
            } else {
              const error = await response.json();
              reject(new Error(error.message || '上传失败'));
            }
          } catch (error) {
            reject(error);
          }
        };

        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // 加载已上传图片
    async function loadUploadedImages() {
      if (!token) return;

      try {
        const response = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/products`, {
          headers: {
            'Authorization': `token ${token}`,
          }
        });

        if (response.ok) {
          const data = await response.json();
          imageList.style.display = 'block';
          uploadedImages.innerHTML = '';

          data.forEach(item => {
            if (item.type === 'file' && item.name.match(/\.(jpg|jpeg|png|gif)$/i)) {
              const div = document.createElement('div');
              div.className = 'image-item';
              div.innerHTML = `
                <span class="name">${item.name}</span>
                <span class="size">${(item.size / 1024).toFixed(1)}KB</span>
              `;
              uploadedImages.appendChild(div);
            }
          });
        }
      } catch (error) {
        console.error('加载图片列表失败:', error);
      }
    }

    // 初始化
    updateUploadButton();
  </script>
</body>
</html>
